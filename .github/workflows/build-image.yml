name: Build and publish image

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "Dockerfile"
      - "pi-config/**"
      - "scripts/**"
      - ".github/workflows/build-image.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # → anton-kochev/pithos

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write     # required to push to ghcr.io
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: base
            target: base
            extra_tags: node        # :base and :node share the same manifest
          - variant: dotnet
            target: dotnet
            extra_tags: ""
          - variant: rust
            target: rust
            extra_tags: ""
          - variant: full
            target: full
            extra_tags: latest      # :full is also tagged :latest on main

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU (for arm64 builds on amd64 runner)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=-${{ matrix.variant }},onlatest=false
          tags: |
            type=raw,value=${{ matrix.variant }},suffix=,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push ${{ matrix.variant }}
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.variant }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.variant }},mode=max

      - name: Push extra tag aliases (${{ matrix.extra_tags }})
        if: matrix.extra_tags != '' && github.ref == 'refs/heads/main'
        run: |
          for ALIAS in ${{ matrix.extra_tags }}; do
            docker buildx imagetools create \
              --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$ALIAS \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.variant }}
          done
