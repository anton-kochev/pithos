name: Build and publish base image

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile.base"
      - "pi-config/**"
      - "entrypoint.sh"
      - "scripts/**"
      - ".github/workflows/base-image.yml"
  workflow_dispatch:

concurrency:
  group: base-image
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU (arm64 emulation on amd64 runner)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:base
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-base
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-base,mode=max

      - name: Smoke test (binaries + UID/GID)
        run: |
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:base \
            bash -euc '
              for bin in tini node uv gh rg fdfind jq fzf python3 git pi; do
                command -v "$bin" >/dev/null || { echo "MISSING: $bin" >&2; exit 1; }
              done
              [ "$(id -u)" = "501" ] || { echo "UID != 501: $(id -u)" >&2; exit 1; }
              [ "$(id -g)" = "20" ] || { echo "GID != 20: $(id -g)" >&2; exit 1; }
              echo "OK"
            '
